<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organ System Laboratory Navigator</title>
<style>
    body { font-family: Arial, sans-serif; background: #eef2f7; margin: 0; padding: 0; color: #333; }
    header { background: #003366; padding: 25px; text-align: center; color: white; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    header h1 { margin: 0; font-size: clamp(24px, 6vw, 36px); letter-spacing: 1px; }
    .container { max-width: 1100px; width: 95%; margin: 40px auto; padding: 10px 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; }
    .card { background: white; padding: 25px; text-align: center; border-radius: 15px; border: 1px solid #ccd4dd; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.3s ease; }
    .card:hover { transform: translateY(-6px); box-shadow: 0 8px 18px rgba(0,0,0,0.18); }
    .card-icon { font-size: 40px; margin-bottom: 12px; }
    footer { margin-top: 40px; padding: 20px; text-align: center; color: #666; font-size: 14px; }
    .nav-buttons { display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; }
    .nav-buttons button { flex:1; padding:10px 15px; border:none; border-radius:8px; font-weight:bold; color:white; cursor:pointer; }
    .nav-buttons button:first-child { background:#003366; }
    .nav-buttons button:last-child { background:#0055aa; }

.bottom-panel {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 85vh;
  background: #fff;
  border-top: 2px solid #ccc;
  z-index: 9999;
  overflow-y: auto;
  transition: transform 0.3s ease;
}

.bottom-panel.hidden {
  transform: translateY(100%);
}

.panel-header {
  position: sticky;
  top: 0;
  background: #f5f5f5;
  padding: 10px;
  text-align: right;
  border-bottom: 1px solid #ddd;
}

#closePanel {
  font-size: 18px;
}

/* ===== Bottom Panel UI Styling ===== */
#bottomPanel h2 {
  color: #003366;
  margin-top: 0;
}

#bottomPanel .subsection {
  background: white;
  padding: 15px;
  margin-top: 20px;
  border-radius: 12px;
  border: 1px solid #ccd4dd;
}

#bottomPanel button,
#bottomPanel .back-button {
  padding: 10px 18px;
  background: #003366;
  color: white;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  transition: background 0.3s, transform 0.2s;
}

#bottomPanel button:hover,
#bottomPanel .back-button:hover {
  background-color: #0055aa;
  transform: translateY(-2px);
}

#bottomPanel input {
  display: block;
  margin: 6px 0 12px;
  padding: 6px;
  width: 100%;
  max-width: 260px;
}

#bottomPanel .inputs-wrapper {
  display: flex;
  gap: 20px;
  margin-top: 20px;
}

#bottomPanel #disease-box {
  background: white;
  padding: 15px;
  border-radius: 12px;
  border: 1px solid #ccd4dd;
}

@media (max-width: 768px) {
  #bottomPanel .inputs-wrapper {
    flex-direction: column;
  }

  #bottomPanel {
    height: 92vh;
  }
}

.bottom-panel {
  box-shadow: 0 -8px 25px rgba(0,0,0,0.25);
  border-top-left-radius: 18px;
  border-top-right-radius: 18px;
}

/* Back to OSL Navigator button fix */
#bottomPanel .back-button {
  text-decoration: none;        /* remove underline */
  text-align: center;           /* center text */
  display: block;               /* allow centering */
  margin: 10px auto 0 auto;     /* center horizontally */
}

.drag-handle {
  width: 40px;
  height: 5px;
  background: #ccc;
  border-radius: 3px;
  margin: 6px auto 10px;
}

#bottomPanel .system-icon {
  font-size: 32px;
  margin-right: 8px;
  vertical-align: middle;
}


/* darken the background */

/*

  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.25);
  z-index: -1; /* behind the panel itself */
}
*/


/* Slide up and doen smoothly on open and close */

.bottom-panel {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 85vh;
  background: #fff;
  border-top: 2px solid #ccc;
  z-index: 9999;
  overflow-y: auto;

  /* NEW: smooth slide animation */
  transform: translateY(100%);
  /* transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); */
  transition: transform 0.6s cubic-bezier(0.25, 1.25, 0.5, 1); /* spring effect */
}

.bottom-panel.visible {
  transform: translateY(0);
}

/* tranasparent overlay */
.panel-overlay {
  position: fixed;
  inset: 0; /* top:0; bottom:0; left:0; right:0; */
  background: rgba(0,0,0,0.2); /* subtle dark overlay */
  z-index: 9998; /* just below panel */
  transition: opacity 0.3s ease;
  opacity: 0;
  pointer-events: none; /* click-through when hidden */
}

.panel-overlay.visible {
  opacity: 1;
  pointer-events: auto; /* blocks clicks when visible */
}

/* drag handle */
.drag-handle {
  width: 40px;
  height: 5px;
  background: #ccc;
  border-radius: 3px;
  margin: 6px auto 10px;
  transition: transform 0.2s ease; /* smooth stretch */
}


</style>

    <h1>Organ System Laboratory (OSL) Navigator</h1>
</header>

<div class="container">
    <div class="grid">
        <div class="card" onclick="openSystem('cardio')"><div class="card-icon">❤️</div>Cardiovascular</div>
        <div class="card" onclick="openSystem('resp')"><div class="card-icon">🌬️</div>Respiratory</div>
        <div class="card" onclick="openSystem('renal')"><div class="card-icon">💧</div>Renal / Urinary</div>
        <div class="card" onclick="openSystem('hepatic')"><div class="card-icon">🧪</div>Hepatobiliary</div>
        <div class="card" onclick="openSystem('endocrine')"><div class="card-icon">🔆</div>Endocrine</div>
        <div class="card" onclick="openSystem('gi')"><div class="card-icon">🍽️</div>Gastrointestinal</div>
        <div class="card" onclick="openSystem('heme')"><div class="card-icon">🩸</div>Hematologic</div>
        <div class="card" onclick="openSystem('neuro')"><div class="card-icon">🧠</div>Neurologic</div>
        <div class="card" onclick="openSystem('immune')"><div class="card-icon">🛡️</div>Immune / Inflammatory</div>
        <div class="card" onclick="openSystem('repro')"><div class="card-icon">⚕️</div>Reproductive</div>
    </div>

    <div class="nav-buttons">
        <button onclick="goBack()">← Back to Symptom Guide</button>
        <button onclick="goMain()">🏠 Return to Main Page</button>
    </div>
</div>

<footer>© Dr. D Emmanuel, Molecular and Chemical Pathologist 2025</footer>


<script>

const systemIcons = {
  cardio: "❤️",
  resp: "🌬️",
  renal: "💧",
  hepatic: "🧪",
  endocrine: "🔆",
  gi: "🍽️",
  heme: "🩸",
  neuro: "🧠",
  immune: "🛡️",
  repro: "⚕️"
};

</script>



<script>

console.log("SCRIPT LOADED");

const systems = {
    cardio: { biomarkers:["High-sensitivity Troponin","BNP / NT-proBNP","Lipid Profile","Lp(a)","Apolipoprotein A1 / B"], normal: { "High-sensitivity Troponin":0.04, "BNP / NT-proBNP":400, "Lipid Profile":5, "Lp(a)":50, "Apolipoprotein A1 / B":120 } },
    resp: { biomarkers:["Arterial Blood Gas","D-dimer","CRP","Eosinophil count"], normal: {"Arterial Blood Gas":7.4,"D-dimer":0.5,"CRP":10,"Eosinophil count":0.3} },
    renal: { biomarkers:["Creatinine","eGFR","Urea","Sodium","Potassium","Urine ACR / PCR"], normal: {"Creatinine":120,"eGFR":90,"Urea":7,"Sodium":140,"Potassium":5,"Urine ACR / PCR":30} },
    hepatic: { biomarkers:["ALT","AST","GGT","Bilirubin","Albumin"], normal: {"ALT":40,"AST":40,"GGT":60,"Bilirubin":20,"Albumin":45} },
    endocrine: { biomarkers:["TSH","FT4","HbA1c","Vitamin D","Insulin"], normal: {"TSH":4,"FT4":23,"HbA1c":6.5,"Vitamin D":30,"Insulin":25} },
    gi: { biomarkers:["Amylase","Lipase","Calprotectin"], normal: {"Amylase":100,"Lipase":60,"Calprotectin":50} },
    heme: { biomarkers:["FBC","Ferritin","B12","Folate"], normal: {"Ferritin":400,"B12":900,"Folate":20} },
    neuro: { biomarkers:["B12","Folate","Electrolytes"], normal: {"B12":900,"Folate":20,"Electrolytes":150} },
    immune: { biomarkers:["CRP / ESR","ANA","Complement levels"], normal: {"CRP / ESR":10,"ANA":1,"Complement levels":80} },
    repro: { biomarkers:["LH / FSH","Prolactin","Testosterone / Estradiol"], normal: {"LH / FSH":25,"Prolactin":25,"Testosterone / Estradiol":30} }
};

const diseaseMap = {
    "High-sensitivity Troponin": ["Myocardial Infarction","Myocarditis"],
    "BNP / NT-proBNP": ["Heart Failure"],
    "Lipid Profile": ["Hyperlipidemia","Atherosclerosis"],
    "Lp(a)": ["Cardiovascular Disease Risk"],
    "Apolipoprotein A1 / B": ["Cardiovascular Disease Risk"],
    "CRP": ["Inflammation","Infection"],
    "D-dimer": ["Thrombosis","Pulmonary Embolism"],
    "Creatinine": ["Chronic Kidney Disease","Acute Kidney Injury"],
    "eGFR": ["Chronic Kidney Disease"],
    "ALT": ["Liver Injury","Hepatitis"],
    "AST": ["Liver Injury","Hepatitis"],
    "TSH": ["Hypothyroidism","Hyperthyroidism"],
    "HbA1c": ["Diabetes Mellitus"]
};

function openSystem(system) {

   console.log("openSystem fired:", system);
   const doc = document;
    
  const data = systems[system];

  const panel = document.getElementById("bottomPanel");
  const panelContent = document.getElementById("panelContent");

  panelContent.innerHTML = "";
  //panel.classList.remove("hidden");
  openBottomPanel();
  document.body.style.overflow = "hidden";

    // Create HTML elements dynamically
    //const doc = tab.document;
    doc.title = system.charAt(0).toUpperCase() + system.slice(1) + " System";

    const style = doc.createElement('style');
    style.textContent = `
        body { font-family: Arial; background:#f8f9fb; padding:20px; }
        h2 { color:#003366; }
        .subsection { background:white; padding:15px; margin-top:20px; border-radius:10px; border:1px solid #ccd4dd; }
        button, .back-button { padding:10px 18px; margin-top:15px; background:#003366; color:white; border:none; border-radius:8px; cursor:pointer; transition: background 0.3s, transform 0.2s; }
        button:hover, .back-button:hover { background-color:#0055aa; transform:translateY(-2px); }
        input { display:block; margin:5px 0; padding:5px; width:200px; }
        .inputs-wrapper { display:flex; gap:20px; margin-top:20px; }
        #inputs-container { flex:1; display:none; }
        #disease-box { flex:1; background:white; padding:15px; border-radius:10px; border:1px solid #ccd4dd; }
    `;
    
    //doc.head.appendChild(style);

    //const h2 = doc.createElement('h2');
    //h2.textContent = system.charAt(0).toUpperCase() + system.slice(1) + " System";
    //panelContent.appendChild(h2);

    const h2 = doc.createElement("h2");
    h2.innerHTML = `<span class="system-icon">${systemIcons[system]}</span> 
    ${system.charAt(0).toUpperCase() + system.slice(1)} System`;
    panelContent.appendChild(h2);

    const subsection = doc.createElement('div');
    subsection.className = 'subsection';
    subsection.innerHTML = `<h3>Key Biomarkers</h3><ul>${data.biomarkers.map(b=>`<li>${b}</li>`).join('')}</ul>`;
    panelContent.appendChild(subsection);

    const inputsWrapper = doc.createElement('div');
    inputsWrapper.className = 'inputs-wrapper';
    const containerDiv = doc.createElement('div'); containerDiv.id = 'inputs-container';
    const diseaseBox = doc.createElement('div'); diseaseBox.id = 'disease-box';
    diseaseBox.innerHTML = '<h3>Possible Diseases</h3><ul id="disease-list"></ul>';
    inputsWrapper.appendChild(containerDiv);
    inputsWrapper.appendChild(diseaseBox);
    panelContent.appendChild(inputsWrapper);

    const enterBtn = doc.createElement('button'); enterBtn.id='enter-values'; enterBtn.textContent='Enter Lab Values';
    const resetBtn = doc.createElement('button'); resetBtn.id='reset-values'; resetBtn.textContent='Reset';
    const backBtn = doc.createElement('a'); backBtn.href='#'; backBtn.className='back-button'; backBtn.textContent='Back to OSL Navigator';

backBtn.addEventListener('click', (e) => {
  e.preventDefault();
  const panel = document.getElementById("bottomPanel");
  panel.classList.remove("visible");  // remove 'visible' to slide down
  document.body.style.overflow = "";  // restore scroll
});

//derek
panel.scrollTop = 0;

    const buttonsWrapper = doc.createElement('div');
	buttonsWrapper.style.display = 'flex';
	buttonsWrapper.style.flexDirection = 'column';  // stack vertically
	buttonsWrapper.style.gap = '10px';
	buttonsWrapper.style.marginTop = '20px';

	buttonsWrapper.appendChild(enterBtn);
	buttonsWrapper.appendChild(resetBtn);
        buttonsWrapper.appendChild(backBtn);

	panelContent.appendChild(buttonsWrapper);        

    // Add script functionality
    enterBtn.addEventListener('click', ()=>{
        
// Always clear and rebuild inputs
containerDiv.innerHTML = '';
diseaseBox.querySelector('#disease-list').innerHTML = '';
containerDiv.style.display = 'block';

// build inputs
data.biomarkers.forEach(b => {
    const label = doc.createElement('label');
    label.textContent = b + (data.normal[b] !== undefined ? ' (Normal ≤ ' + data.normal[b] + ')' : '');
    const input = doc.createElement('input');
    input.placeholder = 'Enter value for ' + b;
    input.id = 'input-' + b.replace(/[^a-zA-Z0-9]/g, '-');
    containerDiv.appendChild(label);
    containerDiv.appendChild(input);
});

// add check button and feedback div
const checkBtn = doc.createElement('button');
checkBtn.textContent = 'Check Values';
containerDiv.appendChild(checkBtn);

const feedback = doc.createElement('div');
feedback.style.marginTop = '15px';
containerDiv.appendChild(feedback);

// handle check button click
checkBtn.addEventListener('click', () => {
    feedback.innerHTML = '';
    diseaseBox.querySelector('#disease-list').innerHTML = '';
    data.biomarkers.forEach(b => {
        const val = parseFloat(doc.getElementById('input-' + b.replace(/[^a-zA-Z0-9]/g, '-')).value);
        if (data.normal[b] !== undefined && !isNaN(val)) {
            const n = data.normal[b];
            const deviation = (val - n) / n;
            let color;
            if (Math.abs(deviation) <= 0.1) color = '#ccffcc';
            else if (deviation > 0) color = `rgb(${Math.round(204 + (255-204)*Math.min(1,deviation/2))},${Math.round(255 - 255*Math.min(1,deviation/2))},${Math.round(204 - 204*Math.min(1,deviation/2))})`;
            else color = `rgb(${Math.round(204 - 204*Math.min(1,-deviation/2))},${Math.round(255 - 255*Math.min(1,-deviation/2))},${Math.round(204 + (255-204)*Math.min(1,-deviation/2))})`;
            doc.getElementById('input-' + b.replace(/[^a-zA-Z0-9]/g, '-')).style.backgroundColor = color;

            const status = deviation > 0.1 ? 'Above typical range' : deviation < -0.1 ? 'Below typical range' : 'Normal';
            const colorText = deviation > 0.1 ? 'red' : deviation < -0.1 ? 'blue' : 'green';
            feedback.innerHTML += '<p style="color:' + colorText + '">' + b + ': ' + val + ' (' + status + ')</p>';

            if (status !== 'Normal' && diseaseMap[b]) {
                diseaseMap[b].forEach(d => {
                    const li = doc.createElement('li');
                    li.textContent = b + ': ' + d;
                    diseaseBox.querySelector('#disease-list').appendChild(li);
                });
            }
        }
    });
});

    });

    resetBtn.addEventListener('click', ()=>{
        data.biomarkers.forEach(b=>{
            const f=doc.getElementById('input-'+b.replace(/[^a-zA-Z0-9]/g,'-')); if(f){ f.value=''; f.style.backgroundColor=''; }
        });
        const feedback = containerDiv.querySelector('div'); if(feedback) feedback.innerHTML='';
        diseaseBox.querySelector('#disease-list').innerHTML='';
    });
}

// Navigation buttons on main page
function goBack(){ window.location.href="Px_confirm.html"; }
function goMain(){ window.location.href="../../Consultancy.html"; }

</script>

function openBottomPanel() {
  const panel = document.getElementById("bottomPanel");
  panel.classList.add("visible");
  document.body.style.overflow = "hidden"; // prevent background scroll
}

function closeBottomPanel() {
  const panel = document.getElementById("bottomPanel");
  panel.classList.remove("visible");
  document.body.style.overflow = "";
}


document.getElementById("closePanel").addEventListener("click", closeBottomPanel);

// Swipe-down logic (mobile)
let startY = 0;
let currentY = 0;
const panel = document.getElementById("bottomPanel");

panel.addEventListener("touchstart", (e) => { startY = e.touches[0].clientY; });
panel.addEventListener("touchmove", (e) => { currentY = e.touches[0].clientY; });
panel.addEventListener("touchend", () => {
  if (currentY - startY > 80) closeBottomPanel();
  startY = currentY = 0;
});

<script>

let startY = 0;
let currentY = 0;

const panel = document.getElementById("bottomPanel");

panel.addEventListener("touchstart", (e) => {
  startY = e.touches[0].clientY;
});

panel.addEventListener("touchmove", (e) => {
  currentY = e.touches[0].clientY;
});

panel.addEventListener("touchend", () => {
  if (currentY - startY > 80) { // swipe down threshold
    panel.classList.add("hidden");
    document.body.style.overflow = "";
  }
  startY = currentY = 0;
});


// transparent overlay
function openBottomPanel() {
  const panel = document.getElementById("bottomPanel");
  const overlay = document.getElementById("panelOverlay");
  panel.classList.add("visible");
  overlay.classList.add("visible");
  document.body.style.overflow = "hidden"; // prevent background scroll
}

function closeBottomPanel() {
  const panel = document.getElementById("bottomPanel");
  const overlay = document.getElementById("panelOverlay");
  panel.classList.remove("visible");
  overlay.classList.remove("visible");
  document.body.style.overflow = "";
}

document.getElementById("panelOverlay").addEventListener("click", closeBottomPanel);


// Stretch animation on swipe
const handle = document.querySelector("#bottomPanel .drag-handle");

panel.addEventListener("touchstart", (e) => {
  startY = e.touches[0].clientY;
  handle.style.transform = "scaleX(1)"; // reset
});

panel.addEventListener("touchmove", (e) => {
  currentY = e.touches[0].clientY;
  let delta = currentY - startY;
  if (delta > 0) { // only downward drag
    let scale = 1 + Math.min(delta / 200, 0.3); // max stretch 1.3x
    handle.style.transform = `scaleX(${scale})`;
  }
});

panel.addEventListener("touchend", () => {
  handle.style.transform = "scaleX(1)"; // return to normal
  if (currentY - startY > 80) closeBottomPanel();
  startY = currentY = 0;
});



</script>
